<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>angst</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #050505;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        overflow: hidden;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
    }

    .container {
        position: relative;
        z-index: 2;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(4px);
    }

    h1 {
        font-size: 64px;
        letter-spacing: 4px;
        margin-bottom: 10px;
        text-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .subtitle {
        opacity: 0.7;
        font-size: 18px;
        margin-bottom: 30px;
        border-bottom: 1px solid rgba(255,255,255,0.2);
        padding-bottom: 10px;
    }

    .info {
        text-align: center;
        margin-bottom: 40px;
        opacity: 0.85;
        line-height: 1.6;
    }

    .buttons {
        display: flex;
        gap: 20px;
    }

    .btn {
        padding: 15px 30px;
        border-radius: 12px;
        background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
        box-shadow: 
            5px 5px 15px #000,
            -3px -3px 10px rgba(255,255,255,0.05);
        text-decoration: none;
        color: white;
        transition: 0.2s;
        font-size: 16px;
        letter-spacing: 1px;
    }

    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 
            0 0 20px rgba(255,255,255,0.1),
            0 0 40px rgba(255,255,255,0.05);
    }
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1>angst</h1>

    <div class="subtitle">
        virtual number provider
    </div>

    <div class="info">
        selling virtual numbers for Telegram<br>
        offering Telegram Premium below market price<br>
        simple and reliable service<br><br>

        working hours:<br>
        mon–fri: 09:00 – 22:00<br>
        sat–sun: 12:00 – 20:00
    </div>

    <div class="buttons">
        <a href="https://t.me/virtnumbersd" target="_blank" class="btn">prices</a>
    </div>
</div>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 1 + 0.2
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        p.y += p.speed;

        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
